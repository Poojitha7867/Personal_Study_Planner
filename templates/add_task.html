<!DOCTYPE html>
<html>
<head>
    <title>Add Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h2 class="text-center mb-4">Add New Task</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="task_name" class="form-control mb-3" placeholder="Task Name" required>

            <input type="text" name="subject" class="form-control mb-3" placeholder="Subject" required>

            <input type="date" name="deadline" class="form-control mb-3" required>

            <select name="priority" class="form-control mb-3">
                <option>High</option>
                <option selected>Medium</option>
                <option>Low</option>
            </select>

            <button type="submit" class="btn btn-primary w-100">Add Task</button>
        </form>

        <a href="{% url 'home' %}" class="btn btn-secondary mt-3">Back</a>

    </div>
</div>

</body>
</html>
